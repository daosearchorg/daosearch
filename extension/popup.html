<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
      font-size: 14px;
      color: #18181b;
      background: #fff;
    }
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f4f4f5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header img { width: 20px; height: 20px; border-radius: 4px; }
    .header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .header a { margin-left: auto; color: #a1a1aa; text-decoration: none; font-size: 11px; }
    .header a:hover { color: #18181b; }
    .content { padding: 16px; }
    .status {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px; border-radius: 8px;
      margin-bottom: 14px; font-size: 13px;
    }
    .status.idle { background: #f4f4f5; color: #71717a; }
    .status.detected { background: #f0fdf4; color: #166534; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status.idle .dot { background: #a1a1aa; }
    .status.detected .dot { background: #22c55e; }
    .btn {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-primary { background: #18181b; color: white; }
    .btn-primary:hover { background: #27272a; }
    .btn-primary:disabled { background: #d4d4d8; cursor: not-allowed; }
    .btn-outline {
      background: white; color: #52525b; border: 1px solid #e4e4e7; margin-top: 8px;
    }
    .btn-outline:hover { background: #f4f4f5; color: #18181b; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <h1>DaoSearch Reader</h1>
    <a href="http://localhost:8080" target="_blank">daosearch.com</a>
  </div>
  <div class="content">
    <div id="status" class="status idle">
      <div class="dot"></div>
      <span id="status-text">Checking page...</span>
    </div>
    <button id="read-btn" class="btn btn-primary" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      <span>Read on DaoSearch</span>
    </button>
    <button id="browse-btn" class="btn btn-outline">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      Browse Library
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
