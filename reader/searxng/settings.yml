use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - duckduckgo

server:
  secret_key: "daosearch-reader-searxng"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json
  default_lang: "auto"

outgoing:
  request_timeout: 10

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
